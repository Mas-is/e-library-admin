<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Daftar Anggota | Sistem Informasi Perpustakaan UNPAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-body" data-page="register.html">
  <main class="login-wrap register-wrap">
    <section class="login-card register-card">
      <div class="logo-box"><div class="logo-seal"></div></div>
      <h1>Daftar Akun<br>Anggota E-Library</h1>
      <p>Isi data diri untuk mengajukan akun. Admin akan menyetujui sebelum akun bisa digunakan.</p>
      <form id="registerForm" autocomplete="off" novalidate>
        <div class="form-field"><label>Nama Lengkap</label><div class="input-wrap"><span class="icon">👤</span><input id="regName" type="text" placeholder="Masukkan nama lengkap"></div><small class="error-text" id="regNameError"></small></div>
        <div class="form-field"><label>Email</label><div class="input-wrap"><span class="icon">✉</span><input id="regEmail" type="email" placeholder="nama@unpam.ac.id"></div><small class="error-text" id="regEmailError"></small></div>
        <div class="form-field"><label>No. Telepon</label><div class="input-wrap"><span class="icon">☎</span><input id="regPhone" type="tel" placeholder="08xxxxxxxxxx"></div><small class="error-text" id="regPhoneError"></small></div>
        <div class="form-field"><label>Role</label><div class="input-wrap"><span class="icon">▦</span><select id="regRole"><option>Mahasiswa</option><option>Dosen</option></select></div></div>
        <div class="form-field"><label>Kata Sandi</label><div class="input-wrap"><span class="icon">▣</span><input id="regPassword" type="password" placeholder="Buat kata sandi"><button class="eye-btn" type="button" id="toggleRegPassword">⊙</button></div><small class="error-text" id="regPasswordError"></small></div>
        <div class="form-field"><label>Konfirmasi Kata Sandi</label><div class="input-wrap"><span class="icon">▣</span><input id="regConfirmPassword" type="password" placeholder="Ulangi kata sandi"></div><small class="error-text" id="regConfirmError"></small></div>
        <div class="register-message" id="registerMessage"></div>
        <button class="btn btn-primary btn-full" type="submit">Kirim Pendaftaran →</button>
      </form>
      <div class="login-switch">Sudah punya akun? <a href="index.html">Kembali ke login</a></div>
      <div class="copy">© 2026 E-Library Management System.</div>
    </section>
  </main>
  <script src="assets/js/main.js"></script>
</body>
</html>
